name: Deploy Sub2API production

on:
  workflow_call:
    inputs:
      expected_sha:
        description: Commit SHA that passed CI
        required: true
        type: string
  workflow_dispatch:

# Automatic calls arrive only after every CI job has passed. Manual dispatch is
# retained as an explicit recovery path. The runner only holds a restricted SSH
# key that can start one fixed systemd service; it does not build the app.
permissions: {}

concurrency:
  group: sub2api-production-deploy
  cancel-in-progress: false

jobs:
  deploy:
    name: Start server-side blue-green release
    runs-on: ubuntu-latest
    timeout-minutes: 90
    env:
      DEPLOY_HOST: ${{ secrets.SUB2API_DEPLOY_HOST }}
      DEPLOY_KNOWN_HOSTS: ${{ secrets.SUB2API_DEPLOY_KNOWN_HOSTS }}
      DEPLOY_KEY: ${{ secrets.SUB2API_DEPLOY_SSH_KEY }}
      DEPLOY_PORT: ${{ secrets.SUB2API_DEPLOY_PORT }}
      DEPLOY_USER: ${{ secrets.SUB2API_DEPLOY_USER }}
    steps:
      - name: Confirm the tested commit is still current
        id: freshness
        env:
          EXPECTED_SHA: ${{ inputs.expected_sha }}
        run: |
          if [ -z "$EXPECTED_SHA" ]; then
            echo "deploy=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          CURRENT_SHA=$(git ls-remote "https://github.com/${GITHUB_REPOSITORY}.git" refs/heads/main | awk '{print $1}')
          test -n "$CURRENT_SHA"
          if [ "$CURRENT_SHA" != "$EXPECTED_SHA" ]; then
            echo "A newer main commit exists; this verified release is stale and will be skipped."
            echo "deploy=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "deploy=true" >> "$GITHUB_OUTPUT"

      - name: Validate deployment configuration
        if: steps.freshness.outputs.deploy == 'true'
        run: |
          test -n "$DEPLOY_HOST"
          test -n "$DEPLOY_KNOWN_HOSTS"
          test -n "$DEPLOY_KEY"
          test -n "$DEPLOY_PORT"
          test -n "$DEPLOY_USER"

      - name: Configure restricted SSH client
        if: steps.freshness.outputs.deploy == 'true'
        run: |
          umask 077
          mkdir -p "$HOME/.ssh"
          # GitHub secrets commonly omit the final newline. OpenSSH's key
          # loader requires it on some runner images; normalize CRLF as well.
          printf '%s\n' "$DEPLOY_KEY" | tr -d '\r' > "$HOME/.ssh/id_ed25519"
          printf '%s\n' "$DEPLOY_KNOWN_HOSTS" > "$HOME/.ssh/known_hosts"
          chmod 600 "$HOME/.ssh/id_ed25519"
          chmod 600 "$HOME/.ssh/known_hosts"
          ssh-keygen -y -f "$HOME/.ssh/id_ed25519" >/dev/null

      - name: Start verified server-side release
        if: steps.freshness.outputs.deploy == 'true'
        run: |
          ssh \
            -i "$HOME/.ssh/id_ed25519" \
            -o BatchMode=yes \
            -o ConnectTimeout=20 \
            -o IdentitiesOnly=yes \
            -o LogLevel=ERROR \
            -o ServerAliveCountMax=180 \
            -o ServerAliveInterval=30 \
            -o StrictHostKeyChecking=yes \
            -p "$DEPLOY_PORT" \
            "$DEPLOY_USER@$DEPLOY_HOST" deploy
